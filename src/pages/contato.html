<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fale conosco! Estaremos à disposição e retornaremos o mais breve possível.">
    <meta name="keywords" content="agnello, contato, fale conosco, contatos">
    <title>Contato</title>
    <link rel="stylesheet" href="/src/css/contato.css">
    <link rel="icon" type="image/png" href="/src/assets/imgs/5376172.png">
     
</head>
<body>
    <header>
        <a href="/index.html">
        <img src="/src/assets/imgs/logoVinheria.png" alt="Logo Vinheria Agnello" class="logo-topo"> </a>
        <nav class="menu">
            <a href="/index.html">Vinheria</a>
            <a href="/src/pages/produtos.html">Produtos</a>
            <a href="/src/pages/harmonizacao.html">Harmonizações</a>
            <a href="/src/pages/sobre-nos.html">Sobre Nós</a>
            <a href="/src/pages/contato.html">Contato</a>
        </nav>
    </header>

    <h1 id="cont">Contato</h1>
    <br><br>
    <form action="">
        <fieldset>
            <legend>Informe os seus dados</legend>

            <div class="cabecalho">
                <h2>Cadastro pessoal</h2>
                <br><br>
                <p>* Indica um campo obrigatório. </p>
            </div>

            <div class="Info-de-contato">
                <h3>Informações de contato</h3>
                <br><br>
                <label for="nome_sobrenome">Nome e sobrenome: *</label>
                <input type="text" name="nome_sobrenome" placeholder="Digite aqui..." required>
            
                <br><br>
            
                <label for="email">e-mail *</label>
                <input type="text" name="email" placeholder="Digite aqui..." required>

                <br><br>

                <label for="telefone-contato">Telefone/celular: *</label>
                <input type="tel" name="telefone-contato" placeholder="(xx) xxxx-xxxx" required>
            </div>

            <div class="genero">
                <h3>Informe o seu gênero: </h3>
                <br><br>
                <input type="radio" name="genero" value="masculino">
                <label for="genero">Masculino</label><br>
                <input type="radio" name="genero" value="feminino">
                <label for="genero">Feminino</label><br>
                <input type="radio" name="genero" value="outro">
                <label for="genero">Outro</label><br>
            </div>

            <div class="sua-msgm">
                <h3>Deixe aqui a sua mensagem: </h3>
                <textarea name="mensagem"> </textarea>
                <br><br>
            </div>
            <button type="submit">Enviar formulário</button>
            <button type="reset">Limpar formulário</button>
            

        </fieldset>
    </form>


</body>
</html>
